site_name: Luis Logs - Stock Trading Journal
site_url: https://trade.luislogs.com
theme:
  name: materialx
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: green
      accent: deep orange
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: green
      accent: deep purple
plugins:
  - blog:
      blog_dir: .
nav:
  - Home: index.md
  - References: references.md
  - Trade History: trade-history.md

extra_css:
  - css/compact-table.css

markdown_extensions:
  - attr_list

  ## Callouts
  - admonition
  - pymdownx.details
  - pymdownx.superfences
